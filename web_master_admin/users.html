<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - ClearPath</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="users.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <div class="brand">
                <div class="logo-icon"><i data-lucide="graduation-cap"></i></div>
                <span class="brand-name">ClearPath</span>
            </div>
            <nav class="nav-links">
                <a href="index.html" class="nav-link"><i data-lucide="layout-grid"></i> Overview</a>
                <a href="users.html" class="nav-link active"><i data-lucide="users"></i> Users</a>
                <a href="departments.html" class="nav-link"><i data-lucide="building-2"></i> Departments</a>
            </nav>
        </div>
        <div class="nav-right">

            <span class="user-email">master@admin.com</span>
            <button class="icon-btn" aria-label="Logout"><i data-lucide="log-out"></i></button>
        </div>
    </header>

    <main class="container">
        
        <div class="page-header">
            <div class="header-text">
                <h1>Users</h1>
                <p class="subtitle">All accounts — students and administrators. Search and assign roles.</p>
            </div>
            <div class="search-container">
                <input type="text" placeholder="Search..." class="search-input">
            </div>
        </div>

        <div class="users-list">
            
            <div class="user-card">
                <div class="user-info">
                    <h3>Lab Admin</h3>
                    <p>admin@lab.com</p>
                </div>
                <div class="user-actions">
                    <span class="badge badge-role">Dept Admin · Lab</span>
                    <button class="action-text">Edit role</button>
                    <button class="icon-btn-danger" aria-label="Delete"><i data-lucide="trash-2"></i></button>
                    <i data-lucide="chevron-right" class="chevron-icon"></i>
                </div>
            </div>

            <div class="user-card">
                <div class="user-info">
                    <h3>Student Test</h3>
                    <p>student@test.com</p>
                </div>
                <div class="user-actions">
                    <span class="badge badge-role-light">Student</span>
                    <button class="action-text">Edit role</button>
                    <button class="icon-btn-danger" aria-label="Delete"><i data-lucide="trash-2"></i></button>
                    <a href="student-details.html"><i data-lucide="chevron-right" class="chevron-icon"></i></a>
                </div>
            </div>

            <div class="user-card">
                <div class="user-info">
                    <h3>Master Admin Test</h3>
                    <p>master@admin.com</p>
                </div>
                <div class="user-actions">
                    <span class="badge badge-role">Master Admin</span>
                    <span class="badge badge-neutral">You</span>
                    <i data-lucide="chevron-right" class="chevron-icon"></i>
                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
