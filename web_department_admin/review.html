<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Request - ClearPath</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="review.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="navbar">
        <div class="nav-left">
            <div class="brand">
                <div class="logo-icon"><i data-lucide="graduation-cap"></i></div>
                <span class="brand-name">ClearPath</span>
            </div>
            <nav class="nav-links">
                <a href="pending.html" class="nav-link active"><i data-lucide="layout-grid"></i> Queue</a>
            </nav>
        </div>
        <div class="nav-right">
            <span class="user-email">admin@lab.com</span>
            <button class="icon-btn" aria-label="Logout"><i data-lucide="log-out"></i></button>
        </div>
    </header>

    <main class="container">
        <div class="breadcrumb">
            <a href="pending.html" class="back-link">
                <i data-lucide="arrow-left"></i> Back to Queue
            </a>
        </div>

        <div class="review-card">
            <div class="review-header">
                <h2>Student Test</h2>
                <p class="subtitle">student@test.com · CSE · 242</p>
            </div>

            <div class="review-section">
                <h4 class="section-title">DOCUMENTS</h4>
                <a href="#" class="document-link">
                    <i data-lucide="download" class="doc-icon"></i>
                    Web Mid Fall 2025 (1).pdf
                </a>
            </div>

            <div class="review-actions">
                <a href="denied.html">
                    <button class="btn-deny">
                        <i data-lucide="x-circle" class="btn-icon"></i> Deny
                    </button>
                </a>
                <a href="approved.html">
                    <button class="btn-approve">
                        <i data-lucide="check-circle" class="btn-icon"></i> Approve
                    </button>
                </a>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
